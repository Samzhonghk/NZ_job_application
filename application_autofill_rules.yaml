autofill_policy:
  default_mode: fill_and_pause_before_submit
  never_click_final_submit: true
  save_screenshot_before_submit: true
  log_filled_fields: true

  can_autofill:
    - name
    - email
    - phone
    - location
    - portfolio
    - website
    - github
    - current_country
    - currently_in_new_zealand
    - nz_work_rights_status
    - sponsorship_requirement
    - visa_expiry
    - earliest_start_date
    - notice_period
    - remote_work_preference
    - relocation_or_travel_preference
    - privacy_statement_consent
    - truthful_information_declaration

  autofill_but_highlight_for_review:
    - salary_expectation
    - minimum_salary
    - work_rights
    - visa_status
    - sponsorship
    - relocation
    - travel
    - reference_checks
    - criminal_record_check
    - police_vet
    - health_or_wellbeing_adjustments
    - privacy_consent
    - declaration

  must_pause:
    - passport_number
    - driver_licence_number
    - national_id
    - ird_number
    - date_of_birth
    - full_legal_name_if_required_and_missing
    - referee_names_or_contact_details
    - criminal_record_details
    - health_condition_details
    - disability_or_accommodation_details
    - conflict_of_interest
    - custom_screening_questions
    - free_text_questions_without_matching_reusable_answer
    - captcha
    - login_required
    - payment_required
    - unclear_or_unmapped_field

