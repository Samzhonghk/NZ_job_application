professional_summaries:
  main: "I am a software and data engineering professional with a strong interest in building reliable, practical systems that turn complex information into usable products and workflows. My work sits at the intersection of software development, data engineering, and applied AI, with a focus on solving real problems rather than using technology for its own sake. I enjoy designing clean data pipelines, building maintainable applications, and using automation or AI to improve how people work. I bring a structured engineering mindset, curiosity, and attention to quality, with strengths in problem-solving, system design, and translating ambiguous needs into working solutions. I am especially motivated by roles where I can combine technical depth with product thinking and create tools that are genuinely useful to users or teams."
  ai_engineer: "I am an AI and software engineering professional focused on building practical, reliable applications with machine learning, automation, and modern software systems. I am interested in applying AI to real-world problems where it can improve decision-making, reduce manual work, or create better user experiences. My strengths include breaking down ambiguous problems, designing maintainable systems, working with data, and turning prototypes into useful products. I enjoy working across the full lifecycle from understanding requirements and experimenting with models or workflows, through to implementation, evaluation, and iteration. I am especially motivated by roles where AI is used thoughtfully and where engineering quality matters as much as innovation."
  data_engineer: "I am a data engineering professional focused on building reliable data systems that make information accessible, trustworthy, and useful for decision-making. I enjoy designing pipelines, improving data quality, working with databases, and creating structures that help analytics, reporting, and AI work more effectively. My strengths include analytical thinking, problem-solving, automation, and understanding how technical systems connect with business needs. I care about building data solutions that are maintainable, well-documented, and practical for the people who depend on them. I am motivated by roles where strong data foundations can support better products, operations, and insights."
  software_engineer: "I am a software engineering professional focused on building maintainable, user-centred systems that solve practical problems. I enjoy turning ambiguous requirements into working products, designing clean technical solutions, and improving systems through thoughtful iteration. My strengths include structured problem-solving, attention to code quality, debugging, automation, and collaborating with both technical and non-technical stakeholders. I am interested in roles where I can combine engineering discipline with product thinking, creating software that is reliable, useful, and easy to evolve over time."

motivation_themes:
  data_or_business_analysis: "I am interested in data and business analysis because it helps turn complex information into clearer decisions, better systems, and more practical workflows. I enjoy understanding how a problem works underneath the surface, identifying patterns or bottlenecks, and using evidence to support better outcomes."
  software_engineering: "I am motivated by software engineering because it allows me to build tools and systems that people can actually use. I enjoy turning ideas and ambiguous requirements into reliable products, improving existing workflows, and creating solutions that are maintainable, scalable, and useful in real-world settings."
  ai_engineering: "I am interested in AI engineering because it combines software, data, and problem-solving in a way that can meaningfully reduce manual work and improve decision-making. I am especially drawn to practical AI applications where models, automation, and human workflows are designed thoughtfully rather than used as novelty."
  data_engineering: "I am motivated by data engineering because good data foundations make everything else possible, from analytics and reporting to AI and product decisions. I enjoy building reliable pipelines, improving data quality, and creating structures that help teams trust and use their information effectively."
  healthcare_or_community_impact: "I am drawn to healthcare and community-focused work because technical systems and data can have a direct impact on people's lives and service quality. I like the idea of using engineering and analysis to support teams who are solving meaningful, real-world problems."
  remote_work: "I value remote work because it supports focused deep work, clear written communication, and collaboration across locations. I work well in remote environments when expectations, documentation, and communication rhythms are clear."
  career_stage: "At this stage of my career, I am looking for roles where I can deepen my technical skills while contributing to practical, user-focused outcomes. I want to work on systems that matter, learn from strong teams, and keep growing across software, data, and applied AI."
  energising_work: "I am energised by work that involves solving ambiguous problems, building useful systems, improving inefficient workflows, and learning new technologies with a clear purpose. I enjoy roles where I can combine technical implementation with product thinking, communication, and continuous improvement."

reusable_answers:
